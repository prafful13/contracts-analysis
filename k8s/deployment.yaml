apiVersion: apps/v1
kind: Deployment
metadata:
  name: contracts-analysis
  namespace: contracts-analysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contracts-analysis
  template:
    metadata:
      labels:
        app: contracts-analysis
    spec:
      containers:
        - name: dashboard
          image: contracts-analysis:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
              name: streamlit
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: contracts-analysis-config
